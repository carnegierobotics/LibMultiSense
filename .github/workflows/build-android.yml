name: Build LibMultiSense on Android

on:
  workflow_call:
    inputs:
      ubuntu_version:
        type: string
        default: ubuntu-latest
        description: A valid Ubuntu runner name.
      android_abi:
        type: string
        default: arm64-v8a
        description: Android ABI to build.
      android_platform:
        type: string
        default: android-24
        description: Android platform version.
      build_type:
        type: string
        default: Release
        description: One of {Release, Debug}.

jobs:
  build:
    name: configure build install consume
    runs-on: ${{ inputs.ubuntu_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build library
        run: |
          cmake -B build-android -S . \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ inputs.android_abi }} \
            -DANDROID_PLATFORM=${{ inputs.android_platform }} \
            -DBUILD_TESTS=OFF \
            -DBUILD_PYTHON_BINDINGS=OFF \
            -DBUILD_LEGACY_API=OFF \
            -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} \
            -DCMAKE_INSTALL_PREFIX=install

          cmake --build build-android -j "$(nproc)"
          cmake --install build-android

      #
      # Library consumption test
      #

      - name: Library consumption test (C++ cross-compile)
        run: |
          cmake -B ci/library-consumption-test/build-android -S ci/library-consumption-test \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ inputs.android_abi }} \
            -DANDROID_PLATFORM=${{ inputs.android_platform }} \
            -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install"

          cmake --build ci/library-consumption-test/build-android -j "$(nproc)"
