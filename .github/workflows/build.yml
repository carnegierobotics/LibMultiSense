name: Build LibMultiSense

on:
  push:
    branches:
      - master
  release:
  pull_request:
    branches:
      - master

jobs:
  #
  # Ubuntu
  #

  # Exercise the widest array of CMake option combinations for the modern API building on the latest Ubuntu runner.
  # This matrix covers compiler regressions, Debug/Release behavior, static/shared linkages, and both minimal and
  # comprehensive optional dependency builds.
  build-ubuntu:
    name: "${{ matrix.ubuntu_version }}, modern API, ${{ matrix.compiler }}, ${{ matrix.build_type }}, ${{ matrix.shared_libs && 'shared' || 'static' }}, ${{ matrix.minimal && 'minimal' || 'full' }}, python"
    strategy:
      fail-fast: false
      matrix:
        ubuntu_version: [ubuntu-24.04]
        compiler: [gcc]
        build_type: [Release, Debug]
        shared_libs: [true, false]
        minimal: [true, false]
        include:
          # Build Clang in representative full shared configurations.
          - ubuntu_version: ubuntu-24.04
            compiler: clang
            build_type: Release
            shared_libs: true
            minimal: false

          - ubuntu_version: ubuntu-24.04
            compiler: clang
            build_type: Debug
            shared_libs: true
            minimal: false

    uses: ./.github/workflows/build-ubuntu.yml
    with:
      ubuntu_version: ${{ matrix.ubuntu_version }}
      compiler: ${{ matrix.compiler }}
      build_type: ${{ matrix.build_type }}
      shared_libs: ${{ matrix.shared_libs }}
      testing: true
      legacy_api: false
      build_json_serialization: ${{ !matrix.minimal }}
      build_opencv: ${{ !matrix.minimal }}
      python_bindings: true
      asan: false
      coverage: false
      upload_artifacts: ${{ matrix.compiler == 'gcc' && matrix.build_type == 'Release' && matrix.shared_libs && !matrix.minimal }}

  # Build the modern API on an older supported Ubuntu runner to ensure dependency versions and toolchain defaults do not
  # silently drift to only support the latest Ubuntu runner.
  build-ubuntu-old-ubuntu:
    name: "${{ matrix.ubuntu_version }}, modern API, gcc, Release, shared, full, python"
    strategy:
      fail-fast: false
      matrix:
        ubuntu_version: [ubuntu-22.04]

    uses: ./.github/workflows/build-ubuntu.yml
    with:
      ubuntu_version: ${{ matrix.ubuntu_version }}
      compiler: gcc
      build_type: Release
      shared_libs: true
      testing: true
      legacy_api: false
      build_json_serialization: true
      build_opencv: true
      python_bindings: true
      asan: false
      coverage: false
      upload_artifacts: false

  # Build the legacy API with both static and shared linkages.
  build-ubuntu-legacy-api:
    name: "ubuntu-24.04, legacy API, gcc, Release, ${{ matrix.shared_libs && 'shared' || 'static' }}, full, no-python"
    strategy:
      fail-fast: false
      matrix:
        shared_libs: [true, false]

    uses: ./.github/workflows/build-ubuntu.yml
    with:
      ubuntu_version: ubuntu-24.04
      compiler: gcc
      build_type: Release
      shared_libs: ${{ matrix.shared_libs }}
      testing: true
      legacy_api: true
      build_json_serialization: true
      build_opencv: true
      python_bindings: false # No Python bindings for legacy API.
      asan: false
      coverage: false
      upload_artifacts: false

  # Build/evaluate code coverage and upload results to Codecov.
  build-ubuntu-coverage:
    name: Code Coverage
    uses: ./.github/workflows/build-ubuntu.yml
    with:
      ubuntu_version: ubuntu-24.04
      compiler: gcc
      build_type: Debug
      shared_libs: true
      testing: true
      legacy_api: false
      build_json_serialization: true
      build_opencv: true
      python_bindings: false
      asan: false
      coverage: true
      upload_artifacts: false
    secrets: inherit

  # Build with address sanitizer and execute the unit tests.
  build-ubuntu-asan:
    name: Address Sanitizer
    uses: ./.github/workflows/build-ubuntu.yml
    with:
      ubuntu_version: ubuntu-24.04
      compiler: gcc
      build_type: Debug
      shared_libs: true
      testing: true
      legacy_api: false
      build_json_serialization: true
      build_opencv: true
      python_bindings: false
      asan: true
      coverage: false
      upload_artifacts: false

  #
  # macOS
  #

  # Build the modern API on macOS with both Apple Clang and Homebrew LLVM across Debug/Release plus one static build.
  # This is a smaller set of configurations than Ubuntu intended solely to catch platform-specific issues.  It is
  # expected that more nuanced issues will be caught by the comprehensive set of Ubuntu configurations.
  build-macos:
    name: "${{ matrix.macos_version }}, modern API, ${{ matrix.compiler }}, ${{ matrix.build_type }}, ${{ matrix.shared_libs && 'shared' || 'static' }}, full, python"
    strategy:
      fail-fast: false
      matrix:
        macos_version: [macos-latest]
        compiler: [apple-clang, brew-llvm]
        build_type: [Release, Debug]
        shared_libs: [true]
        legacy_api: [false]
        build_json_serialization: [true]
        build_opencv: [true]
        python_bindings: [true]
        include:
          # Build one representative static macOS configuration.
          - macos_version: macos-latest
            compiler: apple-clang
            build_type: Release
            shared_libs: false
            legacy_api: false
            build_json_serialization: true
            build_opencv: true
            python_bindings: true

    uses: ./.github/workflows/build-macos.yml
    secrets: inherit
    with:
      macos_version: ${{ matrix.macos_version }}
      compiler: ${{ matrix.compiler }}
      build_type: ${{ matrix.build_type }}
      shared_libs: ${{ matrix.shared_libs }}
      testing: true
      legacy_api: ${{ matrix.legacy_api }}
      build_json_serialization: ${{ matrix.build_json_serialization }}
      build_opencv: ${{ matrix.build_opencv }}
      python_bindings: ${{ matrix.python_bindings }}
      upload_artifacts: ${{ matrix.build_type == 'Release' && matrix.shared_libs }}

  #
  # Windows
  #

  # Build the modern API on Windows with both MSVC and ClangCL across Debug/Release plus one static build.  This is a
  # smaller set of configurations than Ubuntu intended solely to catch platform-specific issues.  It is expected that
  # more nuanced issues will be caught by the comprehensive set of Ubuntu configurations.
  build-windows:
    name: "${{ matrix.windows_version }}, modern API, ${{ matrix.compiler }}, ${{ matrix.build_type }}, ${{ matrix.shared_libs && 'shared' || 'static' }}, full, python"
    strategy:
      fail-fast: false
      matrix:
        windows_version: [windows-2022]
        compiler: [msvc]
        build_type: [Release, Debug]
        shared_libs: [true]
        legacy_api: [false]
        build_json_serialization: [true]
        build_opencv: [true]
        python_bindings: [true]
        include:
          # Build Clang in representative full shared configurations.
          - windows_version: windows-2022
            compiler: clang
            build_type: Release
            shared_libs: true
            legacy_api: false
            build_json_serialization: true
            build_opencv: true
            python_bindings: true

          - windows_version: windows-2022
            compiler: clang
            build_type: Debug
            shared_libs: true
            legacy_api: false
            build_json_serialization: true
            build_opencv: true
            python_bindings: true

          # Build one representative static Windows configuration.
          - windows_version: windows-2022
            compiler: msvc
            build_type: Release
            shared_libs: false
            legacy_api: false
            build_json_serialization: true
            build_opencv: true
            python_bindings: true

    uses: ./.github/workflows/build-windows.yml
    with:
      windows_version: ${{ matrix.windows_version }}
      compiler: ${{ matrix.compiler }}
      build_type: ${{ matrix.build_type }}
      shared_libs: ${{ matrix.shared_libs }}
      legacy_api: ${{ matrix.legacy_api }}
      build_json_serialization: ${{ matrix.build_json_serialization }}
      build_opencv: ${{ matrix.build_opencv }}
      python_bindings: ${{ matrix.python_bindings }}
      upload_artifacts: ${{ matrix.build_type == 'Release' && matrix.shared_libs }}

  #
  # Android
  #

  # Cross-compile the modern API for Android.
  build-android:
    name: "Android, ${{ matrix.android_abi }}, ${{ matrix.build_type }}"
    strategy:
      fail-fast: false
      matrix:
        android_abi: [arm64-v8a]
        android_platform: [android-24]
        build_type: [Release]

    uses: ./.github/workflows/build-android.yml
    with:
      ubuntu_version: ubuntu-latest
      android_abi: ${{ matrix.android_abi }}
      android_platform: ${{ matrix.android_platform }}
      build_type: ${{ matrix.build_type }}
